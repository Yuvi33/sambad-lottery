<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Sambad Today Nagaland State 1 PM, 6 PM & 8 PM Result</title>
    <meta name="description" content="Lottery Sambad Result Today 1 PM, 6 PM, 8 PM. Check Nagaland State Dear Lottery live result.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font:16px/1.7 system-ui,sans-serif;color:#333;background:#fff}
        a{color:#2563eb;text-decoration:underline}.w{max-width:900px;margin:0 auto;padding:0 16px}
        nav{background:#e63223;padding:15px 0}.nav-in{max-width:900px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center}
        .nav-logo{color:#fff;font-weight:800;font-size:24px;text-transform:uppercase;text-decoration:none}
        .nav-link{color:#fff;font-weight:700;text-decoration:none;background:rgba(0,0,0,.2);padding:8px 15px;border-radius:5px}
        
        /* Tabs */
        .tabs{display:flex;gap:10px;max-width:500px;margin:20px auto;padding:0 16px}
        .tab-btn{flex:1;padding:15px;border:none;border-radius:8px;background:#f1f1f1;color:#333;font-weight:800;font-size:18px;cursor:pointer;text-transform:uppercase}
        .tab-btn.active{background:#138808;color:#fff}
        
        /* Card */
        .card-wrap{max-width:500px;margin:20px auto}
        .rcard{background:#fff;border-radius:8px;border:1px solid #e3e7ec;padding:20px;text-align:center}
        .rcard__date{display:inline-block;font-size:14px;font-weight:800;padding:6px 12px;border-radius:9px;margin-bottom:10px}
        .rcard__num{font:900 38px/1 "Arial Black",sans-serif;margin:15px 0;letter-spacing:1px}
        .rcard__prize{color:#138808;font-weight:800;font-size:18px}.rcard__meta{color:#647281;font-size:13px;margin-top:5px}
        .slot-1pm .rcard__num{color:#138808}.slot-1pm .rcard__date{background:#16a34a;color:#ffdd00}
        .slot-6pm .rcard__num{color:#100177}.slot-6pm .rcard__date{background:#f5c518;color:#dc2626}
        .slot-8pm .rcard__num{color:#dc2626}.slot-8pm .rcard__date{background:#dc2626;color:#ffdd00}
        
        /* Table */
        .table-wrap{max-width:500px;margin:30px auto}
        h2{font-size:18px;color:#1e3a5f;margin:0 0 12px;text-align:center}
        table{width:100%;border-collapse:collapse;margin-bottom:20px;background:#fff}th,td{border:1px solid #d1d5db;padding:10px 12px;text-align:center;font-size:15px}th{background:#f3f4f6;font-weight:700}
        
        .ad-slot{width:100%;min-height:90px;background:#f1f1f1;display:flex;align-items:center;justify-content:center;color:#888;margin:20px 0;border-radius:8px;font-size:0.9rem}
        .home-art{max-width:800px;margin:30px auto;padding:0 16px;color:#3f4754}.home-art p{margin-bottom:14px}
        .faq{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:16px 20px;margin:16px 0}
    </style>
</head>
<body>
    <nav>
        <div class="nav-in">
            <a href="/" class="nav-logo">Lottery Sambad</a>
            <a href="/old.html" class="nav-link">Old Results</a>
        </div>
    </nav>

    <div class="w">
        <div class="ad-slot">Advertisement (Top Banner)</div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showSlot('1pm')">1 PM</button>
            <button class="tab-btn" onclick="showSlot('6pm')">6 PM</button>
            <button class="tab-btn" onclick="showSlot('8pm')">8 PM</button>
        </div>
        
        <div id="card-container" class="card-wrap">
            <div class="rcard"><div class="rcard__num">Loading...</div></div>
        </div>
        
        <div id="table-container" class="table-wrap"></div>
        
        <div class="home-art">
            <div class="ad-slot">Advertisement (In-Content)</div>
            <h2 style="text-align:left;">Lottery Sambad Result Today</h2>
            <p><strong>Lottery Sambad</strong> today result. The <strong>1:00 PM</strong>, <strong>6:00 PM</strong> and <strong>8:00 PM</strong> result is updated daily. Stay tuned to check the latest draw result.</p>
        </div>
    </div>

    <script>
        let allData = null;
        let summaryData = null;

        function showSlot(slot) {
            // Find latest result for this slot
            const dates = Object.keys(allData).sort((a, b) => {
                const da = a.split('-').reverse().join('');
                const db = b.split('-').reverse().join('');
                return db.localeCompare(da);
            });
            
            let latestResult = null;
            for (let d of dates) {
                let found = allData[d].find(r => r.slotkey === slot);
                if (found) { latestResult = found; break; }
            }
            
            // Render Card
            const cardHtml = `
                <div class="rcard slot-${slot}">
                    <div class="rcard__date">${latestResult.date}</div>
                    <div class="rcard__num">${latestResult.num}</div>
                    <div class="rcard__prize">1st Prize: ${latestResult.amount}</div>
                    <div class="rcard__meta">Draw No. ${latestResult.drawno} · Dear ${latestResult.name}</div>
                </div>`;
            document.getElementById('card-container').innerHTML = cardHtml;
            
            // Render Table
            const slotName = slot === '1pm' ? '1 PM' : (slot === '6pm' ? '6 PM' : '8 PM');
            let tableHtml = `<h2>Last 10 Lottery Results ${slotName}</h2>
                <table><thead><tr><th>Date</th><th>${slotName} Result</th></tr></thead><tbody>`;
            summaryData[slot].forEach(item => {
                tableHtml += `<tr><td>${item.date}</td><td><strong>${item.num}</strong></td></tr>`;
            });
            tableHtml += `</tbody></table>`;
            document.getElementById('table-container').innerHTML = tableHtml;
            
            // Highlight active button
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="showSlot('${slot}')"]`).classList.add('active');
        }

        // Fetch both files
        Promise.all([
            fetch('/data/latest.json').then(r => r.json()),
            fetch('/data/summary.json').then(r => r.json())
        ]).then(([latest, summary]) => {
            allData = latest;
            summaryData = summary;
            showSlot('1pm'); // Default view
        }).catch(err => {
            document.getElementById('card-container').innerHTML = `<div class="rcard"><div class="rcard__num" style="color:red; font-size:16px;">Error loading data</div></div>`;
        });
    </script>
</body>
</html>
