name: Update Lottery Results

on:
  schedule:
    - cron: '30 8 * * *'
    - cron: '30 13 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # We removed 'cache: npm' here to fix the lock file error!
          
      - name: Install dependencies
        run: npm install  # This installs packages without needing a lock file
        
      - name: Run lottery scraper
        run: node src/scraper/lotteryScraper.js
        
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/
          git commit -m "Update lottery results - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
