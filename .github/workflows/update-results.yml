name: Update Lottery Results

on:
  schedule:
    # Runs every 15 minutes from 12:00 PM to 10:45 PM IST
    # 12:00 PM IST = 6:30 AM UTC
    # 10:45 PM IST = 5:15 PM UTC
    - cron: '*/15 6-17 * * *'
  workflow_dispatch:

permissions:
  contents: write 
  deployments: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run lottery scraper
        run: node src/scraper/lotteryScraper.js
        
      - name: Commit and push results to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ 
          git commit -m "Update lottery results - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sambad-lottery 
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
