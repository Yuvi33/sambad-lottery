name: Update Lottery Results

on:
  schedule:
    # 1 PM Draw -> Runs at 1:02 PM & 1:20 PM IST (UTC: 07:32 & 07:50)
    - cron: '32 7 * * *'
    - cron: '50 7 * * *'
    # 6 PM Draw -> Runs at 6:02 PM & 6:20 PM IST (UTC: 12:32 & 12:50)
    - cron: '32 12 * * *'
    - cron: '50 12 * * *'
    # 8 PM Draw -> Runs at 8:02 PM & 8:20 PM IST (UTC: 14:32 & 14:50)
    - cron: '32 14 * * *'
    - cron: '50 14 * * *'
  workflow_dispatch:

permissions:
  contents: write 
  deployments: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run lottery scraper
        run: node src/scraper/lotteryScraper.js
        
      - name: Commit and push results to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ 
          git commit -m "Update lottery results - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sambad-lottery 
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
