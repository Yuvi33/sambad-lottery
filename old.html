<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Lottery Sambad Results - Archive</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font:16px/1.7 system-ui,sans-serif;color:#333;background:#f9f9f9}
        nav{background:#e63223;padding:15px 0;text-align:center}
        nav a{color:#fff;font-weight:800;font-size:24px;text-decoration:none;text-transform:uppercase}
        .w{max-width:800px;margin:0 auto;padding:20px}
        h1{text-align:center;color:#333;margin-bottom:20px}
        .controls{text-align:center;margin-bottom:20px;display:flex;gap:10px;justify-content:center}
        select{padding:10px;font-size:16px;border-radius:8px;border:1px solid #ccc}
        .date-card{background:#fff;border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:8px;text-decoration:none;color:inherit;display:block}
        .date-head{font-weight:800;color:#e63223;font-size:18px;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px}
        .res-row{display:flex;gap:15px;flex-wrap:wrap}
        .res-badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:800;color:#fff}
        .b-1pm{background:#16a34a}.b-6pm{background:#f5c518;color:#dc2626 !important}.b-8pm{background:#dc2626}
        .ad-slot{width:100%;min-height:100px;background:#eee;display:flex;align-items:center;justify-content:center;color:#888;margin:20px 0;border-radius:8px}
    </style>
</head>
<body>
    <nav><a href="/">Lottery Sambad</a></nav>
    <div class="w">
        <h1>Old Results Archive</h1>
        <div class="ad-slot">Advertisement</div>
        
        <div class="controls">
            <select id="year-sel" onchange="loadHistory()">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
            <select id="month-sel" onchange="loadHistory()">
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        
        <div id="history-list">Select a month to load results...</div>
        <div class="ad-slot">Advertisement</div>
    </div>

    <script>
        function loadHistory() {
            const year = document.getElementById('year-sel').value;
            const month = document.getElementById('month-sel').value;
            const list = document.getElementById('history-list');
            list.innerHTML = '<p>Loading...</p>';
            
            fetch(`/data/history/${year}-${month}.json`)
                .then(res => {
                    if(!res.ok) throw new Error('No data found for this month');
                    return res.json();
                })
                .then(data => {
                    list.innerHTML = '';
                    if(data.length === 0) { list.innerHTML = '<p>No history available for this month.</p>'; return; }
                    
                    // Sort newest first
                    data.sort((a,b) => b.date.localeCompare(a.date));
                    
                    data.forEach(item => {
                        const div = document.createElement('a');
                        div.href = `/result.html?date=${item.date}`;
                        div.className = 'date-card';
                        
                        let resultsHtml = '';
                        if (item.results && item.results.length > 0) {
                            item.results.forEach(r => {
                                resultsHtml += `<div><span class="res-badge b-${r.slotkey}">${r.slotkey.toUpperCase()}</span> <strong>${r.num}</strong></div>`;
                            });
                        } else {
                            resultsHtml = 'Click to view results';
                        }
                        
                        div.innerHTML = `<div class="date-head">Lottery Result - ${item.date}</div><div class="res-row">${resultsHtml}</div>`;
                        list.appendChild(div);
                    });
                })
                .catch(err => {
                    list.innerHTML = `<p style="color:red;">${err.message}. Make sure backfill has run.</p>`;
                });
        }
        // Load current month on page open
        loadHistory();
    </script>
</body>
</html>
